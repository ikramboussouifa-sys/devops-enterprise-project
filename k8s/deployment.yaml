apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-api
  namespace: devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-api
  template:
    metadata:
      labels:
        app: devops-api
    spec:
      containers:
        - name: devops-api
          image: abdelouahedait/devops-api:1.0
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: devops-api-secret
                  key: DATABASE_URL